<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Results — HairAI</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/modals.css" />
</head>
<body>

  <!-- ── Navigation ── -->
  <nav class="navbar">
    <a href="/" class="nav-brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"></path><path d="M8.5 12.5v1.5"></path><path d="M15.5 12.5v1.5"></path><path d="M12 12.5C12 10.5 14 9 15.5 9c-1.5 0-3.5 1.5-3.5 3.5V17"></path><path d="M12 12.5c0-2-2-3.5-3.5-3.5 1.5 0 3.5 1.5 3.5 3.5V17"></path></svg>
      <span>HairAI</span>
    </a>
    <ul class="nav-links">
      <li><a href="/">Restart Scan</a></li>
      <div class="auth-header-container" style="display:inline-flex; margin-left: 1rem;"></div>
    </ul>
  </nav>

  <main id="resultsContainer" class="container" style="min-height: 70vh; padding-top: calc(var(--nav-height) + 2rem);"></main>

  <div style="text-align:center; margin: 4rem 0;">
    <a href="/" class="btn-primary">
      <svg style="margin-right:8px;" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Try Another Photo
    </a>
  </div>

  <!-- ── Footer ── -->
  <footer class="footer container">
    <div class="footer-logo">HairAI</div>
    <p>&copy; 2026 HairAI. Recommending styles globally.</p>
  </footer>

  <script>
    /* ── helpers ─────────────────────────────────────────── */
    function cap(s) {
      if (!s || typeof s !== "string") return "";
      return s.charAt(0).toUpperCase() + s.slice(1);
    }
    function matchClass(score) {
      if (score >= 85) return "match-high";
      if (score >= 70) return "match-mid";
      return "match-low";
    }

    /* ── boot ────────────────────────────────────────────── */
    const container = document.getElementById("resultsContainer");
    const raw = sessionStorage.getItem("result");

    if (!raw) {
      container.innerHTML = `
        <div style="padding-top: 15vh;">
          <div class="error-msg" style="justify-content:center; max-width:500px; margin:0 auto; padding: 2rem;">
            No result found. <a href="/" style="color:var(--error-text); text-decoration:underline;">Please go back and upload a photo.</a>
          </div>
        </div>`;
    } else {
      try {
        renderResults(JSON.parse(raw));
        setTimeout(highlightFavorites, 100);
      } catch (err) {
        container.innerHTML = `
          <div style="padding-top: 15vh;">
            <div class="error-msg" style="justify-content:center; max-width:500px; margin:0 auto; padding: 2rem;">
              ⚠️ Error rendering results: ${err.message}<br/>
              <a href="/" style="color:var(--error-text); text-decoration:underline;">Please go back and try again.</a>
            </div>
          </div>`;
        console.error("renderResults crashed:", err);
      }
    }

    /* ── main render ─────────────────────────────────────── */
    function renderResults(data) {
      const faceLabel   = cap(data.face_shape);
      const genderLabel = cap(data.gender);
      const rec         = data.recommendations  || {};
      const prefs       = data.preferences      || {};
      const allScores   = data.all_scores       || {};

      const barsHTML = Object.entries(allScores)
        .sort((a, b) => b[1] - a[1])
        .map(([cls, score]) => `
          <div class="score-row">
            <span class="score-label">${cap(cls)}</span>
            <div class="score-bar-wrap"><div class="score-bar" style="width:${score}%"></div></div>
            <span class="score-pct">${score.toFixed(1)}%</span>
          </div>`).join("");

      const prefsHTML = `
        <div class="prefs-summary">
          <span class="pref-tag">${genderLabel}</span>
          <span class="pref-tag">${cap(prefs.hair_type)} Hair</span>
          <span class="pref-tag">${cap(prefs.length_pref)} Length Target</span>
          <span class="pref-tag">${cap(prefs.maintenance)} Maint.</span>
        </div>`;

      let hairDetectionSection = "";
      const dh = data.detected_hair;
      if (dh && dh.length && dh.type) {
        const lengthLabel = cap(dh.length);
        const typeLabel   = cap(dh.type);
        const barWidth    = { short: 33, medium: 66, long: 100 }[dh.length] || 50;

        hairDetectionSection = `
          <section class="section hair-detect-section glass-effect">
            <div class="hair-detect-header">
              <span class="ai-badge">AI Scan Complete</span>
              <h2 style="font-family:'Outfit', sans-serif;">Natural Hair Analysis</h2>
              <p class="algo-note">Automatically analyzed from your photo using vision geometry.</p>
            </div>
            <div class="hair-detect-grid">
              <div class="hair-detect-card">
                <span class="hair-detect-label">Detected Length</span>
                <span class="hair-detect-value">${lengthLabel}</span>
                <div class="hair-detect-bar-wrap">
                  <div class="hair-detect-bar" style="width:${barWidth}%"></div>
                </div>
                <div class="hair-length-scale">
                  <span class="${dh.length === "short"  ? "active-scale" : ""}">Short</span>
                  <span class="${dh.length === "medium" ? "active-scale" : ""}">Medium</span>
                  <span class="${dh.length === "long"   ? "active-scale" : ""}">Long</span>
                </div>
              </div>
              <div class="hair-detect-card">
                <span class="hair-detect-label">Detected Texture</span>
                <span class="hair-detect-value">${typeLabel}</span>
                <div class="hair-type-pills">
                  <span class="htype-pill ${dh.type === "straight" ? "htype-active" : ""}">Straight</span>
                  <span class="htype-pill ${dh.type === "wavy"     ? "htype-active" : ""}">Wavy</span>
                  <span class="htype-pill ${dh.type === "curly"    ? "htype-active" : ""}">Curly</span>
                </div>
              </div>
            </div>
          </section>`;
      }

      const recommended = Array.isArray(rec.recommended) ? rec.recommended : [];
      const cardsHTML = recommended.map(h => `
        <div class="hair-card glass-effect">
          <img src="${h.image_url || ''}" alt="${h.name}" class="hair-image" />
          <div class="card-content">
            <div class="card-top">
              <div class="match-ring ${matchClass(h.match_score)}">
                <span>${h.match_score}%</span>
                <small>match</small>
              </div>
              <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
                <h3 style="margin:0; font-family:'Outfit',sans-serif; font-weight:700;">${h.name}</h3>
                <button class="btn-heart" data-name="${h.name.replace(/'/g, "&apos;")}" onclick="toggleFavorite(this, '${h.name.replace(/'/g, "\\'")}')">
                  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" class="heart-icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                </button>
              </div>
            </div>
            <p>${h.description}</p>
            <div class="tip"><em>💡 Pro Tip: ${h.tip}</em></div>
          </div>
        </div>`).join("");

      const avoid     = Array.isArray(rec.avoid) ? rec.avoid : [];
      const avoidHTML = avoid.map(a => `<li>${a}</li>`).join("");

      container.innerHTML = `
        <div class="result-header">
          <div class="face-shape-badge">${faceLabel} Shape</div>
          <p class="confidence-text">AI Confidence Score: <strong>${(data.confidence || 0).toFixed(1)}%</strong></p>
          <p class="shape-desc">${rec.description || ""}</p>
          ${prefsHTML}
        </div>

        ${hairDetectionSection}

        <section class="section glass-effect">
          <h2 style="font-family:'Outfit', sans-serif;">Algorithm Scoring</h2>
          <p class="algo-note" style="margin-bottom:2rem;">Probability distribution across facial geometries.</p>
          <div class="score-grid">${barsHTML}</div>
        </section>

        <section class="section glass-effect" style="background:transparent; border:none; box-shadow:none; padding:1rem 0;">
          <h2 style="font-family:'Outfit', sans-serif; font-size:2rem; margin-bottom:1rem;">Top Styles for 
            <span style="color:var(--primary);">${faceLabel}</span>
          </h2>
          <p class="algo-note">Computed exactly for your geometry and desired maintenance levels.</p>
          <div class="cards-grid">${cardsHTML || "<p style='color:var(--text-muted)'>No ideal recommendations found. Try adjusting preferences.</p>"}</div>
        </section>

        <section class="section glass-effect" style="margin-top:2rem; background: var(--error-bg); border-color: var(--error-border);">
          <h2 style="font-family:'Outfit', sans-serif; color: var(--error-text);">Styles to Avoid</h2>
          <ul style="padding-left:1.5rem; margin-top:1rem; list-style-type:square; color:var(--error-text);">
            ${avoidHTML || "<li>None identified.</li>"}
          </ul>
        </section>
      `;
    }

    async function highlightFavorites() {
      if (typeof loadFavorites !== 'function') return;
      const favs = await loadFavorites();
      const favNames = favs.map(f => f.hairstyle_name);
      document.querySelectorAll('.btn-heart').forEach(btn => {
         if (favNames.includes(btn.dataset.name)) {
            btn.classList.add('active');
         }
      });
    }
  </script>

  <!-- Auth Modal -->
  <div id="authModal" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <h2 id="authTitle" style="font-family:'Outfit', sans-serif; margin-bottom:1rem;">Login</h2>
      <input type="text" id="authUsername" placeholder="Username" class="auth-input" />
      <input type="password" id="authPassword" placeholder="Password" class="auth-input" />
      <p id="authError" style="color:var(--error-text); font-size: 0.85rem; display:none; margin-bottom:1rem;"></p>
      <button class="btn-primary" style="width:100%; margin-top:1rem;" onclick="submitAuth()">Submit</button>
      <p style="text-align:center; margin-top:1.5rem; font-size:0.9rem;">
        <a href="#" onclick="toggleAuthMode()" id="authToggleText" style="color:var(--primary); font-weight:600;">Need an account? Sign up</a>
      </p>
      <button class="btn-secondary" style="width:100%; margin-top:0.75rem;" onclick="closeAuthModal()">Cancel</button>
    </div>
  </div>

  <!-- Favorites Modal -->
  <div id="favModal" class="modal-overlay" style="display:none;">
    <div class="modal-card" style="max-width: 500px;">
      <h2 style="font-family:'Outfit', sans-serif; margin-bottom:1.5rem;">My Saved Styles</h2>
      <div id="favList" class="fav-list"></div>
      <button class="btn-secondary" style="width:100%; margin-top:1.5rem;" onclick="closeFavModal()">Close</button>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
